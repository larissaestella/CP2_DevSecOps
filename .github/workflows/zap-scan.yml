name: DevSecOps - Full Scan ZAP

on:
  push:
    branches: [ "main", "master" ]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout do Código
        uses: actions/checkout@v4

      - name: 2. Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install Flask==3.0.3 Werkzeug==3.0.1

      - name: 4. Iniciar a Aplicação Localmente
        run: |
          nohup python app.py > app.log 2>&1 &
          sleep 5 

      - name: 5. OWASP ZAP Full Scan (Ativo)
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: 'http://127.0.0.1:8080'
          fail_action: true 
          allow_issue_writing: false

      - name: 6. Salvar Relatório HTML do ZAP
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Relatorio-ZAP
          path: report_html.html